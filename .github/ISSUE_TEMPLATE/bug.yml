name: "Bug"
description: "Report a behavior mismatch or regression."
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Use this template for reproducible bugs, regressions, and behavior mismatches.

        - Keep repro steps concrete.
        - Add logs or screenshots whenever possible.
        - Use `Status = blocked` only when the next action depends on an external decision or input.
  - type: dropdown
    id: type
    attributes:
      label: "Type"
      description: "Fixed for this template. Maps to the `type:bug` label."
      options:
        - "bug"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "Maps to the `priority:*` label."
      options:
        - "p0"
        - "p1"
        - "p2"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: "Area"
      description: "Select 1 or 2 areas. Maps to the `area:*` labels."
      multiple: true
      options:
        - "web"
        - "cli"
        - "supabase"
        - "ci"
        - "docs"
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: "Status"
      description: "Use `ready` when the bug can be worked immediately."
      options:
        - "ready"
        - "blocked"
        - "none"
    validations:
      required: true
  - type: textarea
    id: user-impact
    attributes:
      label: "User impact"
      description: "Describe who is affected and how."
      placeholder: |
        Example:
        Anonymous search users get an empty state instead of subtitle matches.
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: "Repro steps"
      description: "List exact steps to reproduce the bug."
      placeholder: |
        1. Start the web app.
        2. Open `/ko/search?q=...`.
        3. Observe the failing behavior.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: "Expected behavior"
      description: "Describe what should happen instead."
      placeholder: |
        Search results should render matching subtitle chunks.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: "Actual behavior"
      description: "Describe what happens now."
      placeholder: |
        The page renders no results and the API returns 401.
    validations:
      required: true
  - type: textarea
    id: suspected-scope
    attributes:
      label: "Suspected scope"
      description: "Call out likely files, systems, or boundaries involved."
      placeholder: |
        - `web/src/app/api/...`
        - `web/src/infrastructure/...`
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance criteria"
      description: "Write 2~5 observable outcomes."
      placeholder: |
        - [ ] Repro steps no longer reproduce the bug.
        - [ ] Existing surrounding behavior does not regress.
        - [ ] Relevant automated checks pass.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: "Verification"
      description: "List the exact commands or manual checks used to validate the fix."
      placeholder: |
        - `cd web && pnpm test`
        - `make e2e-smoke`
    validations:
      required: true
  - type: textarea
    id: dependencies-links
    attributes:
      label: "Dependencies/Links"
      description: "Add related issues, PRs, docs links, or `none`."
      placeholder: |
        none
    validations:
      required: true
  - type: textarea
    id: logs-screenshots-links
    attributes:
      label: "Logs/Screenshots/Links"
      description: "Add logs, screenshots, issue links, PR links, or `none`."
      placeholder: |
        none
    validations:
      required: true
