name: "버그"
description: "재현 가능한 오동작, 회귀, 기대 동작 불일치를 등록합니다."
title: "[버그] "
body:
  - type: markdown
    attributes:
      value: |
        재현 가능한 버그, 회귀, 기대 동작 불일치는 이 템플릿으로 등록합니다.

        기본 서술은 한국어로 작성합니다.
        코드, 명령어, 식별자, 외부 고유명은 더 명확한 경우 원문을 유지해도 됩니다.

        - 재현 절차는 가능한 한 구체적으로 적어주세요.
        - 로그나 스크린샷이 있다면 함께 첨부해주세요.
        - 다음 액션이 외부 결정이나 입력에 달려 있을 때만 `상태 = blocked`를 사용합니다.
  - type: dropdown
    id: type
    attributes:
      label: "유형"
      description: "이 템플릿에서는 `bug`로 고정되며 `type:bug` 라벨로 동기화됩니다."
      options:
        - "bug"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      description: "`priority:*` 라벨로 동기화됩니다."
      options:
        - "p0"
        - "p1"
        - "p2"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: "영역"
      description: "기본 1개, 필요하면 최대 2개까지 선택합니다. `area:*` 라벨로 동기화됩니다."
      multiple: true
      options:
        - "web"
        - "cli"
        - "supabase"
        - "ci"
        - "docs"
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: "상태"
      description: "지금 바로 수정 가능한 버그일 때 `ready`를 선택합니다."
      options:
        - "ready"
        - "blocked"
        - "none"
    validations:
      required: true
  - type: textarea
    id: user-impact
    attributes:
      label: "사용자 영향"
      description: "누가 어떤 영향을 받는지 적어주세요."
      placeholder: |
        예시:
        비로그인 검색 사용자가 자막 매칭 결과 대신 빈 상태 화면을 보게 된다.
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: "재현 절차"
      description: "버그를 재현하는 정확한 순서를 적어주세요."
      placeholder: |
        1. 웹 앱을 실행한다.
        2. `/ko/search?q=...`에 접속한다.
        3. 잘못된 동작을 확인한다.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: "기대 동작"
      description: "원래 어떤 동작이 나와야 하는지 적어주세요."
      placeholder: |
        검색 결과에 매칭되는 자막 청크가 렌더링되어야 한다.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: "실제 동작"
      description: "현재 어떤 잘못된 동작이 발생하는지 적어주세요."
      placeholder: |
        페이지에 결과가 표시되지 않고 API가 401을 반환한다.
    validations:
      required: true
  - type: textarea
    id: suspected-scope
    attributes:
      label: "의심 범위"
      description: "영향이 있을 것으로 보이는 파일, 시스템, 경계를 적어주세요."
      placeholder: |
        - `web/src/app/api/...`
        - `web/src/infrastructure/...`
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "완료 기준"
      description: "관찰 가능한 결과를 2~5개 적어주세요."
      placeholder: |
        - [ ] 재현 절차로 더 이상 같은 버그가 발생하지 않는다.
        - [ ] 주변 기능에 회귀가 생기지 않는다.
        - [ ] 관련 자동화 검증이 통과한다.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: "검증"
      description: "수정 내용을 확인할 정확한 명령어 또는 수동 확인 절차를 적어주세요."
      placeholder: |
        - `cd web && pnpm test`
        - `make e2e-smoke`
    validations:
      required: true
  - type: textarea
    id: dependencies-links
    attributes:
      label: "의존성/링크"
      description: "관련 이슈, PR, 문서 링크를 적고, 없으면 `none`이라고 써주세요."
      placeholder: |
        none
    validations:
      required: true
  - type: textarea
    id: logs-screenshots-links
    attributes:
      label: "로그/스크린샷/링크"
      description: "로그, 스크린샷, 관련 이슈/PR 링크를 적고, 없으면 `none`이라고 써주세요."
      placeholder: |
        none
    validations:
      required: true
