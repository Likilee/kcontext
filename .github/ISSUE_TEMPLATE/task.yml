name: "Task"
description: "Create a non-trivial feature, refactor, chore, or docs task."
title: "[Task] "
body:
  - type: markdown
    attributes:
      value: |
        Use this template for any non-trivial work item in kcontext.

        - Executable issues should be small enough for roughly `0.5~1.5 day` of work.
        - Use `Status = none` for backlog or tracking issues.
        - Tracking issues should not carry `status:ready`.
  - type: dropdown
    id: type
    attributes:
      label: "Type"
      description: "Maps to the `type:*` label."
      options:
        - "feature"
        - "refactor"
        - "chore"
        - "docs"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "Maps to the `priority:*` label."
      options:
        - "p0"
        - "p1"
        - "p2"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: "Area"
      description: "Select 1 or 2 areas. Maps to the `area:*` labels."
      multiple: true
      options:
        - "web"
        - "cli"
        - "supabase"
        - "ci"
        - "docs"
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: "Status"
      description: "Use `ready` only when the issue can be picked up immediately."
      options:
        - "ready"
        - "blocked"
        - "none"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: "Goal"
      description: "Describe the user-facing or repo-facing outcome."
      placeholder: |
        Example:
        Improve subtitle search response quality for exact Korean phrase matches.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "Context"
      description: "Share why this matters, relevant background, and linked specs."
      placeholder: |
        Example:
        Search quality regressed after moving public search access behind an API route.
        Related docs: docs/frontend-architecture.md
    validations:
      required: true
  - type: textarea
    id: in-scope
    attributes:
      label: "In scope"
      description: "List the work that is explicitly included."
      placeholder: |
        - Update the search API request path.
        - Adjust repository mapping logic.
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: "Out of scope"
      description: "List what should not be changed in this issue."
      placeholder: |
        - No UI redesign.
        - No CLI ingestion changes.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance criteria"
      description: "Write 2~5 observable outcomes, not implementation notes."
      placeholder: |
        - [ ] Search results still load for authenticated and anonymous users.
        - [ ] No direct Supabase SDK import is introduced in UI components.
        - [ ] Existing repository tests continue to pass.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: "Verification"
      description: "List the exact commands or manual checks to verify the change."
      placeholder: |
        - `cd web && pnpm lint`
        - `cd web && pnpm test`
        - `cd cli && uv run ruff check .`
    validations:
      required: true
  - type: textarea
    id: dependencies-links
    attributes:
      label: "Dependencies/Links"
      description: "Add related issues, PRs, or docs links. Write `none` when empty."
      placeholder: |
        none
    validations:
      required: true
  - type: textarea
    id: tracking-checklist
    attributes:
      label: "Tracking checklist (optional)"
      description: "Use this only when the issue is a tracking issue for sub-issues."
      placeholder: |
        - [ ] #123
        - [ ] #124
