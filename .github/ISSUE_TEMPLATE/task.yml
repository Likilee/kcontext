name: "작업"
description: "기능, 리팩터링, chore, docs 성격의 비사소한 작업을 등록합니다."
title: "[작업] "
body:
  - type: markdown
    attributes:
      value: |
        kcontext의 비사소한 작업은 이 템플릿으로 등록합니다.

        기본 서술은 한국어로 작성합니다.
        코드, 명령어, 식별자, 외부 고유명은 더 명확한 경우 원문을 유지해도 됩니다.

        - 바로 실행 가능한 이슈는 대략 `0.5~1.5일` 안에 끝날 수 있는 크기로 작성합니다.
        - backlog 또는 tracking issue는 `상태 = none`으로 둡니다.
        - tracking issue에는 `status:ready`를 붙이지 않습니다.
  - type: dropdown
    id: type
    attributes:
      label: "유형"
      description: "`type:*` 라벨로 동기화됩니다."
      options:
        - "feature"
        - "refactor"
        - "chore"
        - "docs"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      description: "`priority:*` 라벨로 동기화됩니다."
      options:
        - "p0"
        - "p1"
        - "p2"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: "영역"
      description: "기본 1개, 필요하면 최대 2개까지 선택합니다. `area:*` 라벨로 동기화됩니다."
      multiple: true
      options:
        - "web"
        - "cli"
        - "supabase"
        - "ci"
        - "docs"
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: "상태"
      description: "지금 바로 착수 가능한 경우에만 `ready`를 선택합니다."
      options:
        - "ready"
        - "blocked"
        - "none"
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: "목표"
      description: "사용자 관점 또는 저장소 관점에서 어떤 결과를 만들지 적어주세요."
      placeholder: |
        예시:
        정확한 한국어 구문 검색 시 자막 검색 결과의 품질을 개선한다.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "배경"
      description: "왜 필요한지, 어떤 맥락인지, 참고할 문서나 이슈가 무엇인지 적어주세요."
      placeholder: |
        예시:
        공개 검색 접근을 API route 뒤로 옮긴 뒤 검색 품질이 떨어졌다.
        관련 문서: docs/frontend-architecture.md
    validations:
      required: true
  - type: textarea
    id: in-scope
    attributes:
      label: "범위 포함"
      description: "이번 이슈에서 분명하게 포함되는 작업만 적어주세요."
      placeholder: |
        - 검색 API 요청 경로를 정리한다.
        - repository 매핑 로직을 조정한다.
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: "범위 제외"
      description: "이번 이슈에서 건드리지 않을 항목을 적어주세요."
      placeholder: |
        - UI 전면 개편은 하지 않는다.
        - CLI 수집 파이프라인은 변경하지 않는다.
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "완료 기준"
      description: "구현 메모가 아니라 관찰 가능한 결과를 2~5개 적어주세요."
      placeholder: |
        - [ ] 로그인 사용자와 비로그인 사용자 모두 검색 결과를 볼 수 있다.
        - [ ] UI 컴포넌트에 Supabase SDK 직접 import가 추가되지 않는다.
        - [ ] 기존 관련 테스트가 계속 통과한다.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: "검증"
      description: "변경 사항을 확인할 정확한 명령어 또는 수동 확인 절차를 적어주세요."
      placeholder: |
        - `cd web && pnpm lint`
        - `cd web && pnpm test`
        - `cd cli && uv run ruff check .`
    validations:
      required: true
  - type: textarea
    id: dependencies-links
    attributes:
      label: "의존성/링크"
      description: "관련 이슈, PR, 문서 링크를 적고, 없으면 `none`이라고 써주세요."
      placeholder: |
        none
    validations:
      required: true
  - type: textarea
    id: tracking-checklist
    attributes:
      label: "트래킹 체크리스트 (선택)"
      description: "하위 이슈를 관리하는 tracking issue일 때만 사용합니다."
      placeholder: |
        - [ ] #123
        - [ ] #124
