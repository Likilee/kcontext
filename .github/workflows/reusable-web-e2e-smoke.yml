name: "Reusable - Web E2E smoke"

on:
  workflow_call:

jobs:
  web-e2e-smoke:
    name: "Web: E2E Smoke"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-web
        with:
          install-playwright: "true"

      - uses: ./.github/actions/setup-supabase

      - name: Start isolated E2E stack
        run: make e2e-up

      - name: Run deterministic smoke E2E
        env:
          CI: true
        run: make e2e-smoke

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            web/test-results
            web/playwright-report
          if-no-files-found: ignore

      - name: Stop isolated E2E stack
        if: always()
        run: make e2e-down
