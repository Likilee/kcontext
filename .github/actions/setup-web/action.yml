name: "Setup web"
description: "Install the web toolchain and dependencies for GitHub Actions jobs."

inputs:
  install-playwright:
    description: "Install Playwright Chromium and system dependencies."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10

    - uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: "pnpm"
        cache-dependency-path: web/pnpm-lock.yaml

    - name: Install web dependencies
      shell: bash
      run: pnpm -C web install --frozen-lockfile

    - if: ${{ inputs.install-playwright == 'true' }}
      name: Install Playwright Chromium
      shell: bash
      run: pnpm -C web exec playwright install --with-deps chromium
