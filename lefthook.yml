pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "web/src/**/*.{ts,tsx}"
      run: npx --prefix web biome check --config-path=. {staged_files}
    sheriff-check:
      glob: "web/src/**/*.{ts,tsx}"
      run: cd web && npx sheriff verify
    ruff-check:
      glob: "cli/**/*.py"
      run: cd cli && uv run ruff check .
    ruff-format:
      glob: "cli/**/*.py"
      run: cd cli && uv run ruff format --check .

pre-push:
  parallel: false
  commands:
    web-lint:
      run: cd web && pnpm lint
    web-arch:
      run: cd web && pnpm lint:arch
    cli-ruff-check:
      run: cd cli && uv run ruff check .
    cli-ruff-format:
      run: cd cli && uv run ruff format --check .
    web-typecheck:
      run: cd web && pnpm tsc --noEmit
    web-test:
      run: cd web && pnpm test
    web-build:
      run: cd web && pnpm build
    web-e2e-smoke:
      run: make e2e-smoke

commit-msg:
  commands:
    commitlint:
      run: cd web && pnpm exec commitlint --config ../commitlint.config.cjs --edit {1}
